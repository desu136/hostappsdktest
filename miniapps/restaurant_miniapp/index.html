<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hospitality Portal Launcher</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #f9fafb;
            --primary: #d97706;
            --primary-hover: #b45309;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --card-bg: #ffffff;
            --border: #e5e7eb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 20px;
        }

        .launcher-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 32px 24px;
            width: 100%;
            max-width: 360px;
            text-align: center;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }

        .logo-ring {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(217, 119, 6, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 36px;
            position: relative;
        }

        .spinner {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border: 3px solid transparent;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-title {
            font-size: 18px;
            font-weight: 800;
            color: var(--text-main);
        }

        .status-desc {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 4px;
            line-height: 1.5;
        }

        /* Settings Fallback Form */
        .settings-form {
            display: none;
            width: 100%;
            flex-direction: column;
            gap: 16px;
            text-align: left;
            margin-top: 8px;
        }

        .settings-form.active {
            display: flex;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-group label {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
        }

        .input-group input {
            background: #f3f4f6;
            border: 1px solid transparent;
            outline: none;
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-main);
            transition: all 0.2s;
        }

        .input-group input:focus {
            border-color: var(--primary);
            background: #ffffff;
        }

        .submit-btn {
            background: var(--primary);
            color: #ffffff;
            font-size: 13px;
            font-weight: 800;
            border: none;
            border-radius: 14px;
            padding: 14px;
            cursor: pointer;
            transition: background 0.2s;
            text-align: center;
        }

        .submit-btn:hover {
            background: var(--primary-hover);
        }

        .retry-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }

        .retry-btn:hover {
            background: #f9fafb;
        }
    </style>
</head>
<body>

    <div class="launcher-card">
        <div class="logo-ring">
            <span>🍔</span>
            <div id="spinner" class="spinner"></div>
        </div>

        <div>
            <h2 id="statusTitle" class="status-title">Launching Hub...</h2>
            <p id="statusDesc" class="status-desc">Connecting to the customer portal application</p>
        </div>

        <!-- Connection Fallback UI (Shows if next.js host is offline) -->
        <div id="fallbackForm" class="settings-form">
            <div class="input-group">
                <label for="serverIp">Server IP Address</label>
                <input type="text" id="serverIp" placeholder="e.g. 192.168.1.8">
            </div>
            <div class="input-group">
                <label for="tenantId">Tenant ID</label>
                <input type="text" id="tenantId" placeholder="UUID (or leave blank)">
            </div>
            <button class="submit-btn" onclick="saveSettings()">Save & Reconnect</button>
            <button class="retry-btn" onclick="checkConnectionAndRedirect()">Retry Connection</button>
        </div>
    </div>

    <!-- SDK Import -->
    <script type="module">
        import { MiniApp } from '../node_modules/@ebisa-tesfaye/miniapp-sdk/index.js';
        window.MiniApp = MiniApp;

        async function initSDK() {
            try {
                await MiniApp.init({
                    appId: "com.echat.hospitality",
                    permissions: ["device.location", "auth.profile", "device.scanner", "storage.read", "storage.write"]
                });
                console.log("Launcher: SDK Initialized with location + profile permissions.");
            } catch (e) {
                console.warn("Launcher: SDK init warning (may be in fallback mode):", e);
            }
        }
        document.addEventListener('DOMContentLoaded', initSDK);
    </script>

    <!-- Launcher Script -->
    <script>
        let hostIp = "192.168.1.8";
        let tenantId = "";

        // Extract settings from hostname
        if (window.location.hostname && window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
            hostIp = window.location.hostname;
        }

        const savedIp = localStorage.getItem("hospitality_host_ip");
        if (savedIp) hostIp = savedIp;

        const savedTenant = localStorage.getItem("hospitality_tenant_id");
        if (savedTenant) tenantId = savedTenant;

        const urlParams = new URLSearchParams(window.location.search);
        const qTenant = urlParams.get("tenantId");
        if (qTenant) {
            tenantId = qTenant;
            localStorage.setItem("hospitality_tenant_id", qTenant);
        }
        const qIp = urlParams.get("hostIp");
        if (qIp) {
            hostIp = qIp;
            localStorage.setItem("hospitality_host_ip", qIp);
        }

        // Initialize input fields
        document.getElementById("serverIp").value = hostIp;
        document.getElementById("tenantId").value = tenantId;

        // Try to get user profile from SDK Bridge
        async function tryGetProfile() {
            try {
                const miniApp = window.MiniApp;
                if (miniApp && miniApp.auth && typeof miniApp.auth.getProfile === 'function') {
                    const profile = await miniApp.auth.getProfile();
                    if (profile) {
                        return {
                            userId: profile.id || profile.userId || '',
                            userName: profile.displayName || profile.name || '',
                            userEmail: profile.email || '',
                            userAvatar: profile.avatarUrl || profile.avatar || ''
                        };
                    }
                }
            } catch (e) {
                console.warn("Launcher: Could not load user profile:", e);
            }
            // Fallback: use previously cached user data
            const cached = localStorage.getItem('miniapp_cached_user');
            if (cached) {
                try {
                    const u = JSON.parse(cached);
                    return { userId: u.id || '', userName: u.name || '', userEmail: u.email || '', userAvatar: u.avatar || '' };
                } catch { /* ignore */ }
            }
            return null;
        }

        // Try to get user GPS location from SDK Bridge or browser
        async function tryGetLocation() {
            try {
                const miniApp = window.MiniApp;
                if (miniApp && miniApp.device && miniApp.device.location && typeof miniApp.device.location.getCurrentPosition === 'function') {
                    const pos = await miniApp.device.location.getCurrentPosition();
                    if (pos && pos.coords) {
                        return { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    }
                }
            } catch (e) {
                console.warn("Launcher: SDK location failed, trying browser:", e);
            }
            // Browser geolocation fallback (non-blocking: resolve after 4s timeout)
            return new Promise((resolve) => {
                if (!navigator.geolocation) { resolve(null); return; }
                const timer = setTimeout(() => resolve(null), 4000);
                navigator.geolocation.getCurrentPosition(
                    (pos) => { clearTimeout(timer); resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }); },
                    () => { clearTimeout(timer); resolve(null); },
                    { timeout: 3500, maximumAge: 60000 }
                );
            });
        }

        // Build target URL with profile & location params
        function buildTargetUrl(baseUrl, profile, location) {
            const params = new URLSearchParams({ hostIp, tenantId });

            if (profile && profile.userId) {
                params.set('userId', profile.userId);
                params.set('userName', profile.userName);
                if (profile.userEmail) params.set('userEmail', profile.userEmail);
                if (profile.userAvatar) params.set('userAvatar', profile.userAvatar);
            }
            if (location) {
                params.set('lat', String(location.lat));
                params.set('lng', String(location.lng));
            }

            return `${baseUrl}/home?${params.toString()}`;
        }

        // Validate and connect
        async function checkConnectionAndRedirect() {
            const spinner = document.getElementById("spinner");
            const title = document.getElementById("statusTitle");
            const desc = document.getElementById("statusDesc");
            const form = document.getElementById("fallbackForm");

            spinner.style.display = "block";
            form.classList.remove("active");
            title.innerText = "Launching...";
            desc.innerText = `Connecting to portal at ${hostIp}:3000`;

            const baseUrl = `http://${hostIp}:3000`;

            try {
                // Ping Next.js server
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 3500);
                await fetch(`${baseUrl}/favicon.ico`, {
                    mode: 'no-cors',
                    signal: controller.signal
                });
                clearTimeout(timeoutId);

                // Server reachable — now fetch profile & location in parallel
                title.innerText = "Personalizing...";
                desc.innerText = "Fetching your profile and location...";

                const [profile, location] = await Promise.all([
                    tryGetProfile(),
                    tryGetLocation()
                ]);

                // Persist profile to localStorage as a local cache
                if (profile && profile.userId) {
                    localStorage.setItem('miniapp_cached_user', JSON.stringify({
                        id: profile.userId,
                        name: profile.userName,
                        email: profile.userEmail,
                        avatar: profile.userAvatar
                    }));
                }

                const targetUrl = buildTargetUrl(baseUrl, profile, location);

                title.innerText = "Redirecting...";
                window.location.replace(targetUrl);

            } catch (e) {
                console.warn("Target server is offline or unreachable:", e);
                spinner.style.display = "none";
                title.innerText = "Connection Unreachable";
                desc.innerText = `Could not reach web server at ${hostIp}:3000. Verify the Server IP and ensure the Next.js app is running.`;
                form.classList.add("active");
            }
        }

        function saveSettings() {
            const ipInput = document.getElementById("serverIp").value.trim();
            const tenantInput = document.getElementById("tenantId").value.trim();

            if (ipInput) {
                hostIp = ipInput;
                localStorage.setItem("hospitality_host_ip", ipInput);
            }
            tenantId = tenantInput;
            localStorage.setItem("hospitality_tenant_id", tenantInput);

            checkConnectionAndRedirect();
        }

        // Run connection test on window load
        window.addEventListener("load", () => {
            setTimeout(checkConnectionAndRedirect, 300);
        });
    </script>
</body>
</html>
