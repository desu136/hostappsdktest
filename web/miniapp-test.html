<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini-App Test - Direct Loading</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 600;
        }
        .header p {
            margin: 8px 0 0 0;
            opacity: 0.8;
            font-size: 14px;
        }
        .status {
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid #4CAF50;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
        }
        .status.loading {
            background: rgba(33, 150, 243, 0.2);
            border: 1px solid #2196F3;
        }
        .status.error {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid #f44336;
        }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #4CAF50;
            color: white;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 8px 0;
        }
        .btn:hover {
            background: #45a049;
            transform: translateY(-1px);
        }
        .btn:disabled {
            background: #cccccc;
            cursor: not-allowed;
            transform: none;
        }
        .btn.secondary {
            background: #2196F3;
        }
        .btn.secondary:hover {
            background: #1976D2;
        }
        .logs {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
        }
        .section {
            margin: 25px 0;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #fff;
        }
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            font-size: 14px;
        }
        .info-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 6px;
        }
        .info-item strong {
            color: #4CAF50;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 Mini-App Test</h1>
            <p>Direct Loading Test</p>
        </div>

        <div id="status" class="status loading">
            Initializing Mini-App...
        </div>

        <div class="section">
            <div class="section-title">📱 Mini-App Information</div>
            <div class="info-grid">
                <div class="info-item">
                    <strong>Status:</strong> <span id="loadStatus">Loading...</span>
                </div>
                <div class="info-item">
                    <strong>Platform:</strong> <span id="platform">Web</span>
                </div>
                <div class="info-item">
                    <strong>URL:</strong> <span id="url">-</span>
                </div>
                <div class="info-item">
                    <strong>Bridge:</strong> <span id="bridgeStatus">-</span>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">🔗 Bridge Communication</div>
            <button class="btn" onclick="testHostCommunication()">Test Host Communication</button>
            <button class="btn secondary" onclick="testNativeBridge()">Test Native Bridge</button>
            <button class="btn secondary" onclick="testMessagePassing()">Test Message Passing</button>
        </div>

        <div class="section">
            <div class="section-title">🎨 UI Features</div>
            <button class="btn" onclick="showAlert()">Show Alert</button>
            <button class="btn secondary" onclick="updateTheme()">Update Theme</button>
            <button class="btn secondary" onclick="testNavigation()">Test Navigation</button>
        </div>

        <div class="section">
            <div class="section-title">💾 Data Storage</div>
            <button class="btn" onclick="testLocalStorage()">Test Local Storage</button>
            <button class="btn secondary" onclick="testSessionStorage()">Test Session Storage</button>
            <button class="btn secondary" onclick="clearStorage()">Clear Storage</button>
        </div>

        <div id="logs" class="logs">
            <div><strong>🚀 Mini-App Logs:</strong></div>
        </div>
    </div>

    <script>
        // Mini-App state
        let miniAppState = {
            loaded: false,
            bridgeAvailable: false,
            hostConnected: false
        };

        // Helper functions
        function log(message) {
            const logs = document.getElementById('logs');
            const timestamp = new Date().toLocaleTimeString();
            logs.innerHTML += '<div>[' + timestamp + '] ' + message + '</div>';
            logs.scrollTop = logs.scrollHeight;
        }

        function updateStatus(message, type = 'success') {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = 'status ' + type;
        }

        function updateInfo() {
            document.getElementById('loadStatus').textContent = miniAppState.loaded ? 'Loaded' : 'Loading...';
            document.getElementById('platform').textContent = navigator.platform;
            document.getElementById('url').textContent = window.location.href.substring(0, 40) + '...';
            document.getElementById('bridgeStatus').textContent = miniAppState.bridgeAvailable ? 'Available' : 'Not Available';
        }

        // Initialize Mini-App
        function initializeMiniApp() {
            log('🚀 Initializing Mini-App...');
            
            // Check if running in WebView
            const isWebView = window.flutter_inappwebview || window.webkit?.messageHandlers;
            
            if (isWebView) {
                log('✅ WebView detected');
                miniAppState.bridgeAvailable = true;
            } else {
                log('⚠️ Running in browser (no WebView)');
                miniAppState.bridgeAvailable = false;
            }

            // Set up message handlers
            setupMessageHandlers();
            
            // Update UI
            miniAppState.loaded = true;
            updateInfo();
            updateStatus('✅ Mini-App Ready!', 'success');
            
            log('✅ Mini-App initialization complete');
        }

        // Setup message handlers
        function setupMessageHandlers() {
            // Listen for messages from host
            if (window.flutter_inappwebview) {
                window.flutter_inappwebview.addJavaScriptHandler('messageFromHost', (args) => {
                    log('📨 Received message from host: ' + JSON.stringify(args));
                });
            }

            // Listen for postMessage
            window.addEventListener('message', (event) => {
                if (event.data.type === 'fromHost') {
                    log('📨 PostMessage from host: ' + JSON.stringify(event.data));
                }
            });
        }

        // Test functions
        function testHostCommunication() {
            log('🔗 Testing host communication...');
            
            if (window.flutter_inappwebview) {
                // Flutter WebView communication
                window.flutter_inappwebview.callHandler('testCommunication', {
                    message: 'Hello from Mini-App!',
                    timestamp: Date.now(),
                    appInfo: {
                        name: 'Test Mini-App',
                        version: '1.0.0'
                    }
                }).then(response => {
                    log('✅ Host response: ' + JSON.stringify(response));
                    miniAppState.hostConnected = true;
                }).catch(error => {
                    log('❌ Host communication error: ' + error.message);
                });
            } else if (window.webkit?.messageHandlers) {
                // iOS WebView communication
                window.webkit.messageHandlers.testCommunication.postMessage({
                    message: 'Hello from Mini-App!',
                    timestamp: Date.now()
                });
                log('✅ Message sent to iOS WebView');
                miniAppState.hostConnected = true;
            } else {
                // Browser fallback
                log('⚠️ No WebView bridge available, using browser fallback');
                window.parent.postMessage({
                    type: 'fromMiniApp',
                    action: 'testCommunication',
                    message: 'Hello from Mini-App!',
                    timestamp: Date.now()
                }, '*');
            }
        }

        function testNativeBridge() {
            log('🔗 Testing native bridge...');
            
            // Test different bridge methods
            const bridges = [
                'flutter_inappwebview',
                'webkit.messageHandlers',
                'MiniAppNativeBridge',
                'AndroidBridge'
            ];
            
            let availableBridges = [];
            bridges.forEach(bridge => {
                const parts = bridge.split('.');
                let obj = window;
                for (const part of parts) {
                    obj = obj?.[part];
                }
                if (obj) {
                    availableBridges.push(bridge);
                }
            });
            
            if (availableBridges.length > 0) {
                log('✅ Available bridges: ' + availableBridges.join(', '));
            } else {
                log('⚠️ No native bridges detected');
            }
        }

        function testMessagePassing() {
            log('📨 Testing message passing...');
            
            // Test different message passing methods
            const testMessage = {
                type: 'test',
                payload: 'Hello from Mini-App!',
                timestamp: Date.now()
            };
            
            // Method 1: PostMessage
            window.parent.postMessage(testMessage, '*');
            log('📤 Sent postMessage');
            
            // Method 2: Custom event
            const event = new CustomEvent('miniapp-message', { detail: testMessage });
            window.dispatchEvent(event);
            log('📤 Dispatched custom event');
            
            // Method 3: Storage event (cross-tab communication)
            localStorage.setItem('miniapp-test', JSON.stringify(testMessage));
            log('📤 Storage event sent');
        }

        function showAlert() {
            log('🎨 Showing alert...');
            alert('Hello from Mini-App!\n\nThis is a test alert to verify UI functionality.');
            log('✅ Alert shown');
        }

        function updateTheme() {
            log('🎨 Updating theme...');
            
            const container = document.querySelector('.container');
            const currentBg = container.style.background;
            
            if (currentBg.includes('667eea')) {
                container.style.background = 'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)';
                log('🎨 Theme changed to pink');
            } else {
                container.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
                log('🎨 Theme changed to blue');
            }
        }

        function testNavigation() {
            log('🧭 Testing navigation...');
            
            // Test navigation request to host
            if (window.flutter_inappwebview) {
                window.flutter_inappwebview.callHandler('navigateTo', {
                    route: '/chat-detail',
                    params: { userId: 'test_user_123' }
                }).then(() => {
                    log('✅ Navigation request sent');
                }).catch(error => {
                    log('❌ Navigation error: ' + error.message);
                });
            } else {
                log('⚠️ Navigation not available in browser');
            }
        }

        function testLocalStorage() {
            log('💾 Testing local storage...');
            
            try {
                const testData = {
                    message: 'Hello from Mini-App!',
                    timestamp: Date.now(),
                    userAgent: navigator.userAgent
                };
                
                localStorage.setItem('miniapp-test-data', JSON.stringify(testData));
                log('✅ Data saved to localStorage');
                
                const retrieved = JSON.parse(localStorage.getItem('miniapp-test-data'));
                log('✅ Data retrieved: ' + JSON.stringify(retrieved));
            } catch (error) {
                log('❌ LocalStorage error: ' + error.message);
            }
        }

        function testSessionStorage() {
            log('💾 Testing session storage...');
            
            try {
                const testData = {
                    sessionId: 'session_' + Date.now(),
                    loadedAt: new Date().toISOString()
                };
                
                sessionStorage.setItem('miniapp-session', JSON.stringify(testData));
                log('✅ Data saved to sessionStorage');
                
                const retrieved = JSON.parse(sessionStorage.getItem('miniapp-session'));
                log('✅ Session data: ' + JSON.stringify(retrieved));
            } catch (error) {
                log('❌ SessionStorage error: ' + error.message);
            }
        }

        function clearStorage() {
            log('🗑️ Clearing storage...');
            
            localStorage.removeItem('miniapp-test-data');
            sessionStorage.removeItem('miniapp-session');
            log('✅ Storage cleared');
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', initializeMiniApp);
        
        // Log page lifecycle events
        window.addEventListener('load', () => log('📄 Page loaded'));
        window.addEventListener('beforeunload', () => log('📄 Page unloading'));
        window.addEventListener('focus', () => log('👁️ Page focused'));
        window.addEventListener('blur', () => log('🙈 Page blurred'));
    </script>
</body>
</html>
